<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Initialize dataLayer immediately so analytics.js can queue events
         even before GTM finishes loading. GTM will replay everything in the
         dataLayer once it boots, so no events are lost. -->
    <script>window.dataLayer = window.dataLayer || [];</script>
    <!-- CookieYes CMP — must load as early as possible so it can gate downstream trackers -->
    <script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/56f067457d6a30de02f8cc31/script.js"></script>
    <!-- Google Tag Manager — consent-gated by CookieYes ("Analytics" category).
         type="text/plain" prevents browser execution; CookieYes flips the type
         to text/javascript after the user grants consent, then GTM boots and
         replays any events already queued in dataLayer.
         Container: GTM-THK4XJZW — see ANALYTICS.md §2 for tag setup. -->
    <script type="text/plain" data-cookieyes="cookieyes-analytics">(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-THK4XJZW');</script>
    <!-- Non-production bootstrap. CookieYes only renders its banner on the
         exact production domain registered in its dashboard. On localhost,
         on Vercel preview deploys (unique *.vercel.app subdomains), and on
         any other non-whitelisted origin, the gated GTM script above never
         activates and tracking is invisible.

         %VITE_VERCEL_ENV% is substituted at build time:
           'production'  → Vercel production deploy. Skip this block; the
                           CookieYes-gated path above handles real users.
           'preview'     → Vercel preview deploy (e.g. PR previews). Load
                           GTM directly so tracking can be verified.
           'development' → local dev or unknown env. Load GTM directly.

         Use GTM Preview from tagmanager.google.com when testing so events
         are tagged debug_mode=1 and land in GA4 DebugView only — not in
         production reports. -->
    <script>
      (function () {
        var env = '%VITE_VERCEL_ENV%';
        if (env === 'production') return;
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != 'dataLayer' ? '&l=' + l : '';
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-THK4XJZW');
        // eslint-disable-next-line no-console
        console.info(
          '[analytics] non-prod bootstrap: GTM loaded directly on ' +
            location.hostname + ' (VERCEL_ENV=' + (env || 'unset') +
            '). Use GTM Preview to flag events as debug_mode=1.',
        );
      })();
    </script>
    <meta name="description" content="Independent study tool for the Professional Scrum Product Owner I (PSPO I) exam. Concept lessons grounded in the 2020 Scrum Guide, with spaced review of every question you miss." />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>PSPO·I Trainer — Study tool for the Professional Scrum Product Owner I exam</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      html { background: #ffffff; }
      body { background: #ffffff; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) — non-JS fallback. Will only meaningfully
         fire if a user has JS disabled, in which case they can't see the consent
         banner either. Kept for completeness. -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-THK4XJZW"
      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div id="root"></div>
    <noscript>
      <p style="padding:32px;font-family:system-ui,sans-serif;font-size:17px;line-height:1.47">
        PSPO·I Trainer is an interactive study app and requires JavaScript to run.
      </p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

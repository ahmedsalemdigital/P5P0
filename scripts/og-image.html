<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG Image — source</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 1200px;
        height: 630px;
        background: #000;
        font-family: 'Press Start 2P', ui-monospace, monospace;
        color: #00ff41;
        overflow: hidden;
      }

      /* Subtle scanlines overlay — pure visual flair from the arcade theme. */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 255, 65, 0.04) 0px,
          rgba(0, 255, 65, 0.04) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
        z-index: 2;
      }

      /* Marquee — same construction as src/components/arcade/TitleScreen.jsx */
      .marquee {
        position: absolute;
        top: 40px;
        left: 60px;
        right: 60px;
        bottom: 40px;
        border: 4px solid #00aa00;
        background: linear-gradient(180deg, #001a00 0%, #000800 100%);
        box-shadow:
          inset 0 0 32px rgba(0, 255, 65, 0.22),
          0 0 28px rgba(0, 255, 65, 0.28);
        padding: 32px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
      }

      /* Corner brackets */
      .corner {
        position: absolute;
        width: 22px;
        height: 22px;
        border: 4px solid #00ff41;
      }
      .corner.tl { top: -6px; left: -6px; border-right: none; border-bottom: none; }
      .corner.tr { top: -6px; right: -6px; border-left: none; border-bottom: none; }
      .corner.bl { bottom: -6px; left: -6px; border-right: none; border-top: none; }
      .corner.br { bottom: -6px; right: -6px; border-left: none; border-top: none; }

      .status-bar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        letter-spacing: 4px;
      }
      .status-bar .p1 { color: #00aa00; }
      .status-bar .coins { color: #ffb000; letter-spacing: 6px; }
      .status-bar .hi { color: #ffb000; }

      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        margin: 8px 0;
      }

      .title {
        font-size: 96px;
        letter-spacing: 16px;
        color: #00ff41;
        line-height: 1;
        text-shadow:
          0 0 8px #00ff41,
          0 0 24px #00ff41,
          0 0 48px rgba(0, 255, 65, 0.7),
          0 8px 0 #003300;
      }

      .subtitle {
        font-size: 22px;
        color: #ffb000;
        letter-spacing: 24px;
        padding-left: 24px;
        text-shadow: 0 0 8px rgba(255, 176, 0, 0.55);
      }

      .mascot-wrap {
        position: relative;
        padding-bottom: 24px;
      }
      .mascot-wrap::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 6px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          #00aa00 20%,
          #00ff41 50%,
          #00aa00 80%,
          transparent 100%
        );
        opacity: 0.6;
      }

      .tagline {
        font-size: 16px;
        color: #00aa00;
        letter-spacing: 6px;
      }

      .footline {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        letter-spacing: 4px;
        color: #006600;
      }
      .footline .insert {
        color: #ffb000;
        text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="marquee">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="status-bar">
        <span class="p1">1P</span>
        <span class="coins">● ● ●</span>
        <span class="hi">HI 100%</span>
      </div>

      <div class="stack">
        <div class="title">P5P0&nbsp;I</div>
        <div class="subtitle">★ TRAINER ★</div>

        <div class="mascot-wrap">
          <!-- Mascot — pixel-perfect copy of src/components/arcade/Mascot.jsx -->
          <svg
            width="180"
            height="180"
            viewBox="0 0 16 16"
            shape-rendering="crispEdges"
            style="image-rendering: pixelated; display: block;"
          >
            <rect x="3" y="3" width="10" height="9" fill="#00aa00" />
            <rect x="4" y="5" width="3" height="3" fill="#003300" />
            <rect x="9" y="5" width="3" height="3" fill="#003300" />
            <rect x="5" y="5" width="2" height="2" fill="#00ff41" />
            <rect x="10" y="5" width="2" height="2" fill="#00ff41" />
            <rect x="4" y="12" width="8" height="4" fill="#004400" />
            <rect x="7" y="12" width="2" height="4" fill="#ccffdd" />
            <rect x="7" y="13" width="2" height="3" fill="#00ff41" />
            <rect x="7" y="13" width="1" height="1" fill="#ccffdd" />
            <rect x="5" y="12" width="2" height="2" fill="#ccffdd" />
            <rect x="4" y="12" width="2" height="3" fill="#004400" />
            <rect x="9" y="12" width="2" height="2" fill="#ccffdd" />
            <rect x="10" y="12" width="2" height="3" fill="#004400" />
            <rect x="2" y="12" width="2" height="3" fill="#004400" />
            <rect x="12" y="12" width="2" height="3" fill="#004400" />
            <rect x="2" y="14" width="2" height="1" fill="#ccffdd" />
            <rect x="12" y="14" width="2" height="1" fill="#ccffdd" />
            <rect x="5" y="15" width="2" height="1" fill="#002200" />
            <rect x="9" y="15" width="2" height="1" fill="#002200" />
          </svg>
        </div>

        <div class="tagline">▸ SCRUM PRODUCT OWNER ◂</div>
      </div>

      <div class="footline">
        <span>© 2026 · 2020 SCRUM GUIDE</span>
        <span class="insert">▸ INSERT COIN ◂</span>
      </div>
    </div>
  </body>
</html>
